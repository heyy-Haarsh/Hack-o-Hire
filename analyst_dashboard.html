<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FraudShield — Analyst Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 560px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; margin-bottom: 6px; }
        .header p { color: #94a3b8; font-size: 14px; }
        .badge {
            display: inline-block;
            background: #dc2626;
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 16px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12px; color: #64748b; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .field input {
            width: 100%;
            padding: 11px 14px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
        }
        .field input:focus { border-color: #3b82f6; }
        .hint { font-size: 12px; color: #64748b; margin-top: 5px; }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        button {
            flex: 1;
            padding: 14px;
            font-size: 15px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:hover { opacity: 0.88; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        .approve { background: linear-gradient(135deg, #059669, #10b981); color: white; }
        .reject  { background: linear-gradient(135deg, #dc2626, #ef4444); color: white; }
        #status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            display: none;
            text-align: center;
        }
        .status-ok  { background: #064e3b; color: #34d399; display: block !important; }
        .status-err { background: #450a0a; color: #f87171; display: block !important; }
        .divider { border: none; border-top: 1px solid #334155; margin: 24px 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="badge">🔴 LIVE — AWAITING ANALYST DECISION</div>
            <h1>🛡️ FraudShield Analyst Dashboard</h1>
            <p>Human-in-the-Loop Incident Approval</p>
        </div>

        <div class="field">
            <label>n8n Execution ID</label>
            <input type="text" id="execId" placeholder="e.g. 42" autofocus>
            <div class="hint">
                In n8n → left sidebar → <strong>Executions</strong> → find the one with 🟡 <em>Waiting</em> status → copy its <strong>numeric ID</strong>
            </div>
        </div>

        <hr class="divider">

        <div class="btn-group">
            <button class="approve" onclick="submitAction(true)">✅ Approve Quarantine</button>
            <button class="reject"  onclick="submitAction(false)">❌ Mark False Positive</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        function submitAction(isApproved) {
            const execId   = document.getElementById('execId').value.trim().replace(/\D/g, '');
            const statusEl = document.getElementById('status');

            if (!execId) {
                alert('Please enter the Execution ID number from n8n.');
                return;
            }

            statusEl.className = '';
            statusEl.style.display = 'block';
            statusEl.textContent = '⏳ Sending decision to n8n...';

            // Correct URL for n8n Wait node resumption (no suffix)
            const url = `http://localhost:5678/webhook-waiting/${execId}?approved=${isApproved}`;

            fetch(url)
                .then(r => r.text())
                .then(() => {
                    statusEl.className = 'status-ok';
                    statusEl.textContent = isApproved
                        ? '✅ QUARANTINE APPROVED — Workflow resumed. Check n8n for final audit log.'
                        : '✅ MARKED FALSE POSITIVE — Correction queued for model retraining.';
                })
                .catch(err => {
                    statusEl.className = 'status-err';
                    statusEl.textContent = '❌ Could not reach n8n on localhost:5678. (' + err.message + ')';
                });
        }
    </script>
</body>
</html>
